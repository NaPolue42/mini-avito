{% extends 'base.html' %}

{% block title %}{% if form.instance.pk %}Редактировать{% else %}Создать{% endif %} объявление{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2>{% if form.instance.pk %}Редактировать{% else %}Создать{% endif %} объявление</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'ad_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
